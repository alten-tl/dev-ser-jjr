version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: examen-alten-postgres
    environment:
      POSTGRES_DB: examen_alten
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - examen-alten-network

volumes:
  postgres_data:

networks:
  examen-alten-network:
    driver: bridge
